<!DOCTYPE html>
<html>
<head>
    <title>Test Search</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <input type="text" id="itemFilterInput" placeholder="ابحث هنا">
    <button id="clearFilter">مسح</button>
    
    <div class="item-wrapper" data-category="1">
        <div class="item-card" data-item-name="برجر" data-item-barcode="123">برجر - 123</div>
    </div>
    
    <div class="item-wrapper" data-category="2">
        <div class="item-card" data-item-name="بيتزا" data-item-barcode="456">بيتزا - 456</div>
    </div>
    
    <div class="item-wrapper" data-category="1">
        <div class="item-card" data-item-name="شاورما" data-item-barcode="789">شاورما - 789</div>
    </div>

    <script>
    $(document).ready(function() {
        console.log('Test page loaded');
        
        $('#itemFilterInput').keyup(function() {
            var searchText = $(this).val().toLowerCase();
            console.log('البحث عن:', searchText);
            
            if (searchText === '') {
                $('.item-wrapper').show();
                return;
            }
            
            var found = 0;
            $('.item-wrapper').each(function() {
                var $card = $(this).find('.item-card');
                var itemName = $card.data('item-name');
                var itemBarcode = $card.data('item-barcode');
                
                if (itemName) itemName = itemName.toString().toLowerCase();
                if (itemBarcode) itemBarcode = itemBarcode.toString().toLowerCase();
                
                if ((itemName && itemName.includes(searchText)) || 
                    (itemBarcode && itemBarcode.includes(searchText))) {
                    $(this).show();
                    found++;
                } else {
                    $(this).hide();
                }
            });
            
            console.log('تم العثور على', found, 'صنف');
        });
        
        $('#clearFilter').click(function() {
            $('#itemFilterInput').val('');
            $('.item-wrapper').show();
        });
    });
    </script>
</body>
</html>
